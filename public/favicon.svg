<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wine glass outline -->
  <g fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bowl -->
    <path d="M 25 15 Q 25 45 50 55 Q 75 45 75 15 L 70 10 L 30 10 Z" fill="#FFF"/>
    
    <!-- Stem -->
    <line x1="50" y1="55" x2="50" y2="80" />
    
    <!-- Base -->
    <ellipse cx="50" cy="82" rx="15" ry="3" fill="#333"/>
  </g>
  
  <!-- Red wine -->
  <path d="M 30 10 L 32 20 Q 32 35 50 42 Q 68 35 68 20 L 70 10 Z" fill="#722F37" opacity="0.9"/>
  
  <!-- Wine shine/highlight -->
  <ellipse cx="40" cy="18" rx="6" ry="8" fill="#FFFFFF" opacity="0.3"/>
</svg>
